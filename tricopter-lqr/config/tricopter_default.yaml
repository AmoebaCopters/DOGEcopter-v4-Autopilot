# Tricopter Flight Controller Configuration
# All units SI: m, kg, s, rad

vehicle:
  mass: 1.5  # kg
  # Full 3x3 inertia tensor (symmetric)
  inertia:
    - [0.03, 0.001, 0.0005]
    - [0.001, 0.025, 0.0008]
    - [0.0005, 0.0008, 0.04]

rotors:
  - name: "front"
    position: [0.25, 0.0, 0.0]        # metres from CG
    thrust_axis: [0.0, 0.0, 1.0]      # unit vector, body frame
    spin_axis: [0.0, 0.0, 1.0]        # unit vector, body frame
    spin_direction: 1                   # +1 = CW, -1 = CCW
    k_T: 1.5e-5                        # thrust coeff: T = k_T * omega^2
    k_Q: 2.5e-7                        # drag torque coeff: Q = k_Q * omega^2

  - name: "rear-left"
    position: [-0.15, 0.20, 0.0]
    thrust_axis: [0.0, 0.0, 1.0]
    spin_axis: [0.0, 0.0, 1.0]
    spin_direction: -1
    k_T: 1.5e-5
    k_Q: 2.5e-7

  - name: "rear-right"
    position: [-0.15, -0.20, 0.0]
    thrust_axis: [0.0, 0.0, 1.0]
    spin_axis: [0.0, 0.0, 1.0]
    spin_direction: 1
    k_T: 1.5e-5
    k_Q: 2.5e-7

# INDI controller gains
indi:
  Kp_att: [6.0, 6.0, 2.0]        # attitude P gains (roll, pitch, yaw_rate)
  Kp_rate: [15.0, 15.0, 8.0]     # rate P gains (p, q, r)
  filter_cutoff_hz: 30.0          # angular accel filter cutoff

# Motor dynamics
motor:
  tau: 0.03               # motor time constant in seconds
  omega_max: 2500.0        # motor speed limit [rad/s]

# Priority-based control allocation
allocation:
  priority_mode: true      # enable priority-based allocation

# Outer-loop altitude PID
altitude_pid:
  Kp: 5.0
  Ki: 1.0
  Kd: 3.0
  integral_limit: 5.0
  output_limit: 10.0

# Simulation parameters
simulation:
  dt: 0.001             # integration timestep (s)
  duration: 10.0         # total sim time (s)
  initial_roll_deg: 5.0
  initial_pitch_deg: 3.0
  initial_yaw_deg: 0.0
  z_desired: 0.0        # desired altitude (m)
  # Impulse disturbance
  disturbance_time: 2.0          # when disturbance starts (s)
  disturbance_duration: 0.01     # how long disturbance lasts (s)
  disturbance_torque: [0.1, 0.05, 0.02]  # Nm in body frame
